<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天过DUE了吗？</title>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #818CF8;
      --primary-dark: #3730A3;
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --text: #111827;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 12px rgba(79,70,229,0.08), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(79,70,229,0.12), 0 2px 8px rgba(0,0,0,0.06);
      --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(160deg, #F0EDFF 0%, #F9FAFB 40%, #FFF7ED 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-overflow-scrolling: touch;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .hidden { display: none !important; }

    /* Header */
    .app-header {
      text-align: center;
      padding: 24px 0 16px;
    }
    .app-header h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #818CF8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .app-header p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      background: linear-gradient(135deg, #4F46E5, #4338CA);
      color: white;
      padding: 14px 24px;
      width: 100%;
      min-height: 48px;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }
    .btn-primary:active { background: linear-gradient(135deg, #3730A3, #312E81); transform: scale(0.97); box-shadow: 0 1px 4px rgba(79,70,229,0.2); }
    .btn-primary:disabled { background: #9CA3AF; cursor: not-allowed; }

    .btn-secondary {
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
      padding: 12px 24px;
      width: 100%;
      min-height: 48px;
    }
    .btn-secondary:active { background: #EEF2FF; }

    .btn-small {
      background: var(--primary);
      color: white;
      padding: 8px 16px;
      font-size: 14px;
      min-height: 36px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 8px;
      font-size: 14px;
    }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255,255,255,0.6);
      margin-bottom: 16px;
    }

    /* Inputs */
    input, textarea {
      width: 100%;
      background: rgba(249,250,251,0.6);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
      background: white;
    }
    textarea { resize: vertical; min-height: 130px; line-height: 1.7; border-radius: 12px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group { margin-bottom: 16px; }
    .form-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* Separator */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border));
    }
    .divider::after {
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .divider span { padding: 4px 16px; background: rgba(243,244,246,0.6); border-radius: 12px; }

    /* Room header */
    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-lg);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .room-code {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--primary);
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    }
    .room-status {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .status-waiting { background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: #92400E; box-shadow: 0 1px 4px rgba(245,158,11,0.2); }
    .status-rolling { background: linear-gradient(135deg, #DBEAFE, #BFDBFE); color: #1E40AF; box-shadow: 0 1px 4px rgba(37,99,235,0.2); animation: pulse-badge 2s ease-in-out infinite; }
    .status-done { background: linear-gradient(135deg, #D1FAE5, #A7F3D0); color: #065F46; box-shadow: 0 1px 4px rgba(16,185,129,0.2); }
    @keyframes pulse-badge { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    /* Share section */
    .share-section { text-align: center; }
    .share-section .qr-wrapper {
      display: inline-block;
      padding: 16px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .share-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .share-actions .btn-small { border-radius: 20px; padding: 8px 20px; }
    .link-display {
      font-size: 12px;
      color: var(--text-secondary);
      word-break: break-all;
      margin-top: 8px;
      padding: 8px;
      background: #F3F4F6;
      border-radius: 6px;
    }

    /* Participant list */
    .participant-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: rgba(249,250,251,0.6);
      border-radius: 12px;
      border: none;
      transition: background 0.2s ease;
    }
    .participant-item:last-child { margin-bottom: 0; }
    .participant-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .participant-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      border: 2px solid rgba(255,255,255,0.8);
    }
    .participant-name { font-weight: 500; font-size: 15px; }
    .participant-name .you-tag {
      font-size: 11px;
      color: var(--primary);
      margin-left: 4px;
    }
    .participant-roll {
      font-weight: 800;
      font-size: 20px;
      min-width: 44px;
      text-align: right;
    }
    .roll-pending { color: var(--text-secondary); font-size: 13px; font-weight: 500; font-style: italic; }
    .roll-done { color: var(--primary); text-shadow: 0 1px 3px rgba(79,70,229,0.2); }

    .waiting-slots {
      color: var(--text-secondary);
      text-align: center;
      padding: 16px 12px;
      font-size: 14px;
      border: 2px dashed var(--border);
      border-radius: 12px;
      margin-top: 8px;
      background: rgba(249,250,251,0.4);
    }

    /* Dice area — no backdrop-filter here, it breaks 3D transforms */
    .dice-area {
      text-align: center;
      padding: 32px 20px;
      background: linear-gradient(180deg, #F5F3FF 0%, #FFFFFF 100%);
      border-radius: var(--radius-lg);
      position: relative;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    /* 3D Dice */
    .dice-scene {
      width: 140px;
      height: 140px;
      margin: 0 auto 28px;
      perspective: 500px;
      position: relative;
    }
    .dice-scene::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 12px;
      background: radial-gradient(ellipse, rgba(79,70,229,0.2), transparent 70%);
      border-radius: 50%;
      filter: blur(4px);
    }
    .dice-cube {
      width: 140px;
      height: 140px;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(20deg);
      transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    .dice-cube.rolling {
      animation: dice-spin 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
      filter: drop-shadow(0 0 12px rgba(79,70,229,0.4));
    }
    .dice-face {
      position: absolute;
      width: 140px;
      height: 140px;
      background: linear-gradient(145deg, #FFFFFF 0%, #F0F0F5 100%);
      border: 2px solid rgba(79,70,229,0.15);
      border-radius: 18px;
      display: grid;
      padding: 22px;
      box-shadow: inset 0 2px 6px rgba(255,255,255,0.8), inset 0 -2px 6px rgba(0,0,0,0.04);
    }
    .dice-face .dot {
      width: 20px;
      height: 20px;
      background: radial-gradient(circle at 35% 35%, #6366F1, #312E81);
      border-radius: 50%;
      align-self: center;
      justify-self: center;
      box-shadow: 0 2px 4px rgba(49,46,129,0.3), inset 0 1px 2px rgba(255,255,255,0.2);
    }
    /* Face positions */
    .face-1 { transform: rotateY(0deg) translateZ(70px); grid-template: 1fr / 1fr; }
    .face-2 { transform: rotateY(180deg) translateZ(70px); grid-template: 1fr 1fr / 1fr; }
    .face-2 .dot:first-child { justify-self: end; align-self: start; }
    .face-2 .dot:last-child { justify-self: start; align-self: end; }
    .face-3 { transform: rotateY(90deg) translateZ(70px); grid-template: 1fr 1fr 1fr / 1fr; }
    .face-3 .dot:first-child { justify-self: end; align-self: start; }
    .face-3 .dot:last-child { justify-self: start; align-self: end; }
    .face-4 { transform: rotateY(-90deg) translateZ(70px); grid-template: 1fr 1fr / 1fr 1fr; }
    .face-5 { transform: rotateX(90deg) translateZ(70px); grid-template: 1fr 1fr 1fr / 1fr 1fr; }
    .face-5 .dot:nth-child(3) { grid-column: 1 / -1; }
    .face-6 { transform: rotateX(-90deg) translateZ(70px); grid-template: 1fr 1fr 1fr / 1fr 1fr; }

    @keyframes dice-spin {
      0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      15% { transform: rotateX(270deg) rotateY(180deg) rotateZ(90deg); }
      35% { transform: rotateX(630deg) rotateY(360deg) rotateZ(180deg); }
      55% { transform: rotateX(990deg) rotateY(540deg) rotateZ(260deg); }
      75% { transform: rotateX(1260deg) rotateY(680deg) rotateZ(330deg); }
      90% { transform: rotateX(1400deg) rotateY(740deg) rotateZ(355deg); }
    }

    /* Roll button */
    .btn-roll {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 50%, #B45309 100%);
      color: white;
      padding: 18px 56px;
      font-size: 22px;
      font-weight: 800;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(217,119,6,0.4), 0 2px 8px rgba(217,119,6,0.2);
      min-height: 60px;
      display: inline-block;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .btn-roll:not(:disabled) {
      animation: roll-pulse 2s ease-in-out infinite;
    }
    .btn-roll::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }
    .btn-roll:not(:disabled)::before {
      animation: btn-shine 3s ease-in-out infinite;
    }
    .btn-roll:active:not(:disabled) { transform: scale(0.93); box-shadow: 0 2px 10px rgba(217,119,6,0.3); }
    .btn-roll:disabled {
      background: linear-gradient(135deg, #9CA3AF, #6B7280);
      box-shadow: none;
      cursor: not-allowed;
      animation: none;
    }
    @keyframes roll-pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(217,119,6,0.4); }
      50% { box-shadow: 0 4px 30px rgba(217,119,6,0.6), 0 0 0 6px rgba(245,158,11,0.1); }
    }
    @keyframes btn-shine {
      0%, 70%, 100% { left: -100%; }
      85% { left: 100%; }
    }

    /* Results */
    .result-item {
      background: white;
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      margin-bottom: 12px;
      border-left: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.4s ease-out both;
    }
    .result-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--primary), var(--primary-light));
      border-radius: 4px 0 0 4px;
    }
    .result-item:nth-child(1) { animation-delay: 0.05s; }
    .result-item:nth-child(2) { animation-delay: 0.1s; }
    .result-item:nth-child(3) { animation-delay: 0.15s; }
    .result-item:nth-child(4) { animation-delay: 0.2s; }
    .result-item:nth-child(5) { animation-delay: 0.25s; }
    .result-item:nth-child(6) { animation-delay: 0.3s; }
    .result-item:nth-child(7) { animation-delay: 0.35s; }
    .result-item:nth-child(8) { animation-delay: 0.4s; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-rank {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
      margin-right: 14px;
      box-shadow: 0 2px 6px rgba(79,70,229,0.25);
    }
    .result-rank.gold { background: linear-gradient(135deg, #F59E0B, #FBBF24); box-shadow: 0 2px 8px rgba(245,158,11,0.35); }
    .result-rank.silver { background: linear-gradient(135deg, #9CA3AF, #D1D5DB); box-shadow: 0 2px 6px rgba(156,163,175,0.3); }
    .result-rank.bronze { background: linear-gradient(135deg, #B45309, #D97706); box-shadow: 0 2px 6px rgba(180,83,9,0.3); }
    .result-left {
      display: flex;
      align-items: center;
      flex: 1;
    }
    .result-info h4 { font-size: 15px; font-weight: 600; }
    .result-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .result-topic {
      text-align: right;
      flex-shrink: 0;
      max-width: 55%;
    }
    .result-topic .topic-tag {
      display: inline-block;
      background: linear-gradient(135deg, #EEF2FF, #E0E7FF);
      color: var(--primary-dark);
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 8px;
      margin: 2px 0;
      font-weight: 600;
      border: 1px solid rgba(79,70,229,0.1);
    }
    .result-topic .no-topic {
      color: var(--text-secondary);
      font-size: 13px;
      font-style: italic;
    }

    .celebration {
      text-align: center;
      padding: 20px;
      font-size: 17px;
      color: var(--success);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(31,41,55,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(17,24,39,0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }
    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      animation: modalSlideUp 0.3s var(--transition-bounce);
    }
    .modal-content h3 { margin-bottom: 16px; font-size: 18px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalSlideUp { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--text-secondary);
      background: none;
      border: none;
      padding: 8px 0;
      margin-bottom: 8px;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(229,231,235,0.6);
      border-radius: 4px;
      overflow: hidden;
      margin: 10px 0;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s var(--transition-bounce);
      position: relative;
      overflow: hidden;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    #progress-fill { background: linear-gradient(90deg, #818CF8, #4F46E5); }
    #roll-progress-fill { background: linear-gradient(90deg, #34D399, #059669); }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .progress-label span:last-child {
      font-variant-numeric: tabular-nums;
      color: var(--text);
      font-weight: 600;
    }

    /* Confetti */
    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      z-index: 200;
      pointer-events: none;
      animation: confetti-fall 3s ease-in forwards;
    }

    /* Hero dice */
    .hero-dice {
      font-size: 56px;
      margin-bottom: 8px;
      display: inline-block;
      animation: hero-float 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 12px rgba(79,70,229,0.25));
    }
    @keyframes hero-float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    /* Hero button */
    .btn-hero {
      font-size: 18px;
      padding: 16px 24px;
      min-height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%) !important;
      box-shadow: 0 4px 14px rgba(79,70,229,0.35) !important;
    }

    /* Join button green */
    .btn-join {
      background: linear-gradient(135deg, #059669, #10B981) !important;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(16,185,129,0.3);
      min-height: 44px;
      font-size: 15px;

    /* Section title */

  </style>
</head>
<body>
  <div class="container">

    <!-- ========== Screen: Home ========== -->
    <div id="screen-home">
      <div class="app-header">
        <div class="hero-dice" aria-hidden="true">🎲</div>
        <h1>今天过DUE了吗？</h1>
        <p>掷骰子，分题目，告别DDL焦虑</p>

        <button class="btn-primary btn-hero" onclick="showScreen('create')">🎯 创建房间</button>

                   style="text-transform:uppercase; letter-spacing:2px; font-weight:700; flex:1;"

            <button class="btn-small btn-join" onclick="joinByCode()" style="flex-shrink:0;">加入</button>

    <!-- ========== Screen: Create Room ========== -->
    <div id="screen-create" class="hidden">
      <button class="back-btn" onclick="showScreen('home')">← 返回</button>
      <div class="app-header" style="padding-top:8px;">
        <h1>创建房间</h1>
      </div>

      <div class="card">
        <div class="form-group">
          <label for="input-room-name">房间名称（可选）</label>
          <input type="text" id="input-room-name" placeholder="例如：第三周分题" maxlength="30">
        </div>

        <div class="form-group">
          <label for="input-topics">题目列表</label>
          <textarea id="input-topics" placeholder="每行输入一个题目，例如：&#10;Question 1: Neural Networks&#10;Question 2: Decision Trees&#10;Question 3: NLP Basics&#10;Question 4: Computer Vision&#10;Question 5: Reinforcement Learning"></textarea>
          <div class="form-hint">每行一个题目，会自动识别行数</div>
        </div>

        <div class="form-group">
          <label for="input-max-players">参与人数</label>

        <button class="btn-primary" onclick="createRoom()" id="btn-create-confirm">确认创建</button>

    </div>

    <!-- ========== Screen: Room ========== -->
    <div id="screen-room" class="hidden">
      <div class="room-header">
        <div>
          <div style="font-size:13px; color:var(--text-secondary);">房间号</div>
          <div class="room-code" id="room-code-display"></div>
        </div>
        <span class="room-status" id="room-status-badge"></span>

      <div id="room-name-display" style="font-size:16px; font-weight:600; margin-bottom:16px;"></div>

      <!-- Share -->
      <div class="card share-section" id="share-card">
        <div class="qr-wrapper" id="qrcode"></div>
        <div class="share-actions">

        <div class="link-display" id="room-link-display"></div>

      <!-- Progress -->
      <div class="card" id="progress-card">
        <div class="progress-label">

        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" style="margin-top:4px;">
          <span>掷骰进度</span>
          <span id="roll-progress-text">0 / 5 人已掷</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="roll-progress-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Participants -->
      <div class="card">
        <h3 class="section-title">👥 参与者</h3>
        <div id="participant-list"></div>
      </div>

      <!-- Dice area -->
      <div class="card dice-area" id="dice-card">
        <div class="dice-scene">
          <div class="dice-cube" id="dice-cube">
            <div class="dice-face face-1"><div class="dot"></div></div>
            <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
            <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          </div>
        </div>
        <button class="btn-roll" id="btn-roll" onclick="rollDice()">掷骰子</button>
        <div id="roll-message" style="margin-top:12px; font-size:14px; color:var(--text-secondary);"></div>

        <div class="card">
          <h3 class="section-title" style="justify-content:center;">🏆 分题结果</h3>
          <div id="results-list"></div>
        </div>
        <div class="celebration" id="celebration-text"></div>
        <button class="btn-secondary" onclick="showScreen('home')" style="margin-top:8px;">返回首页</button>

    <!-- ========== Nickname Modal ========== -->

      <div class="modal-content">
        <h3>输入你的昵称</h3>

          <input type="text" id="input-nickname" placeholder="你的昵称" maxlength="20">
        </div>
        <button class="btn-primary" onclick="confirmNickname()">确认加入</button>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    // ==================== CONFIG ====================
    // TODO: 替换为你的 Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyCHpr0TVRbpk39GaRbWol7C6IM1cPgZ5EU",
      authDomain: "dice-roller-e3d7e.firebaseapp.com",
      databaseURL: "https://dice-roller-e3d7e-default-rtdb.firebaseio.com",
      projectId: "dice-roller-e3d7e",
      storageBucket: "dice-roller-e3d7e.firebasestorage.app",
      messagingSenderId: "848421739392",
      appId: "1:848421739392:web:16f3634617f0cc847d7f65",
      measurementId: "G-GBQW3Z9EXT"
    };

    // ==================== INIT ====================
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==================== STATE ====================
    let currentRoomId = null;
    let currentRoom = null;
    let playerId = getPlayerId();
    let myRoll = null;
    let isRolling = false;
    let listeners = [];

    // ==================== UTILS ====================
    function getPlayerId() {
      let id = localStorage.getItem('dice_player_id');
      if (!id) {
        id = 'p_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        localStorage.setItem('dice_player_id', id);
      }
      return id;
    }

    function generateRoomId() {
      const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
      let result = '';
      const array = new Uint8Array(6);
      crypto.getRandomValues(array);
      for (let i = 0; i < 6; i++) {
        result += chars[array[i] % chars.length];
      }
      return result;
    }

    const AVATAR_COLORS = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED','#DB2777','#2563EB','#16A34A','#EA580C'];

    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
      return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ==================== SCREENS ====================
    function showScreen(name) {
      document.getElementById('screen-home').classList.add('hidden');
      document.getElementById('screen-create').classList.add('hidden');
      document.getElementById('screen-room').classList.add('hidden');
      document.getElementById('screen-' + name).classList.remove('hidden');
    }

    // ==================== ROOM CREATION ====================
    async function createRoom() {
      const topicsText = document.getElementById('input-topics').value.trim();
      if (!topicsText) { showToast('请输入题目列表'); return; }

      const topicsArr = topicsText.split('\n').map(t => t.trim()).filter(t => t);
      if (topicsArr.length < 1) { showToast('至少需要1个题目'); return; }

      const maxPlayers = parseInt(document.getElementById('input-max-players').value) || 5;
      const roomName = document.getElementById('input-room-name').value.trim() || '今天过DUE了吗';

      const btn = document.getElementById('btn-create-confirm');
      btn.disabled = true;
      btn.textContent = '创建中...';

      try {
        let roomId = generateRoomId();
        // Check for collision
        const existing = await db.ref('rooms/' + roomId).once('value');
        if (existing.exists()) roomId = generateRoomId();

        const topics = {};
        topicsArr.forEach((t, i) => topics[i] = t);

        await db.ref('rooms/' + roomId).set({
          meta: {
            name: roomName,
            createdAt: firebase.database.ServerValue.TIMESTAMP,
            status: 'waiting',
            maxPlayers: maxPlayers
          },
          topics: topics
        });

        // Clean up old rooms
        cleanupOldRooms();

        // Enter room
        enterRoom(roomId);
      } catch (err) {
        showToast('创建失败: ' + err.message);
        btn.disabled = false;
        btn.textContent = '确认创建';
      }
    }

    function joinByCode() {
      const code = document.getElementById('input-room-code').value.trim().toUpperCase();
      if (!code || code.length < 4) { showToast('请输入有效的房间号'); return; }
      enterRoom(code);
    }

    // ==================== ENTER ROOM ====================
    async function enterRoom(roomId) {
      // Check room exists
      const snapshot = await db.ref('rooms/' + roomId + '/meta').once('value');
      if (!snapshot.exists()) {
        showToast('房间不存在');
        return;
      }

      currentRoomId = roomId;
      // Update URL
      const url = new URL(window.location);
      url.searchParams.set('room', roomId);
      window.history.replaceState({}, '', url);

      showScreen('room');
      setupRoomUI(roomId);

      // Check if we already joined
      const meSnap = await db.ref('rooms/' + roomId + '/participants/' + playerId).once('value');
      if (meSnap.exists()) {
        myRoll = meSnap.val().roll;
        startListening(roomId);
      } else {
        // Show nickname modal
        document.getElementById('nickname-modal').classList.remove('hidden');
        document.getElementById('input-nickname').focus();
      }
    }

    function setupRoomUI(roomId) {
      document.getElementById('room-code-display').textContent = roomId;
      const roomUrl = window.location.origin + window.location.pathname + '?room=' + roomId;
      document.getElementById('room-link-display').textContent = roomUrl;

      // QR code
      const qrEl = document.getElementById('qrcode');
      qrEl.innerHTML = '';
      try {
        new QRCode(qrEl, {
          text: roomUrl,
          width: 180,
          height: 180,
          colorDark: '#1F2937',
          colorLight: '#FFFFFF',
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch(e) {
        qrEl.innerHTML = '<p style="color:#999;font-size:12px;">QR码生成失败</p>';
      }
    }

    async function confirmNickname() {
      const name = document.getElementById('input-nickname').value.trim();
      if (!name) { showToast('请输入昵称'); return; }

      // Check room capacity
      const participantsSnap = await db.ref('rooms/' + currentRoomId + '/participants').once('value');
      const metaSnap = await db.ref('rooms/' + currentRoomId + '/meta').once('value');
      const meta = metaSnap.val();
      const current = participantsSnap.val() ? Object.keys(participantsSnap.val()).length : 0;

      if (current >= meta.maxPlayers) {
        showToast('房间已满');
        return;
      }

      await db.ref('rooms/' + currentRoomId + '/participants/' + playerId).set({
        name: name,
        joinedAt: firebase.database.ServerValue.TIMESTAMP,
        roll: null,
        rolledAt: null
      });

      // Save nickname for next time
      localStorage.setItem('dice_nickname', name);

      document.getElementById('nickname-modal').classList.add('hidden');
      startListening(currentRoomId);
    }

    // ==================== REAL-TIME LISTENERS ====================
    function startListening(roomId) {
      // Clean old listeners
      listeners.forEach(l => l.off());
      listeners = [];

      const roomRef = db.ref('rooms/' + roomId);

      // Meta
      const metaRef = roomRef.child('meta');
      metaRef.on('value', (snap) => {
        if (!snap.exists()) return;
        const meta = snap.val();
        currentRoom = currentRoom || {};
        currentRoom.meta = meta;
        document.getElementById('room-name-display').textContent = meta.name;
        updateStatusBadge(meta.status);
      });
      listeners.push(metaRef);

      // Topics
      const topicsRef = roomRef.child('topics');
      topicsRef.on('value', (snap) => {
        currentRoom = currentRoom || {};
        currentRoom.topics = snap.val() || {};
      });
      listeners.push(topicsRef);

      // Participants
      const partRef = roomRef.child('participants');
      partRef.on('value', (snap) => {
        currentRoom = currentRoom || {};
        currentRoom.participants = snap.val() || {};
        renderParticipants();
        updateProgress();
        checkAllJoined();
        checkAllRevealed();
      });
      listeners.push(partRef);

      // PreRolls (pre-assigned unique numbers)
      const preRollsRef = roomRef.child('preRolls');
      preRollsRef.on('value', (snap) => {
        currentRoom = currentRoom || {};
        currentRoom.preRolls = snap.val() || null;
        updateProgress();
      });
      listeners.push(preRollsRef);

      // Assignments
      const assignRef = roomRef.child('assignments');
      assignRef.on('value', (snap) => {
        if (snap.exists()) {
          currentRoom = currentRoom || {};
          currentRoom.assignments = snap.val();
          renderResults();
        }
      });
      listeners.push(assignRef);
    }

    function updateStatusBadge(status) {
      const badge = document.getElementById('room-status-badge');
      const map = {
        waiting: ['等待加入', 'status-waiting'],
        rolling: ['掷骰中', 'status-rolling'],
        done: ['已完成', 'status-done']
      };
      const [text, cls] = map[status] || ['未知', ''];
      badge.textContent = text;
      badge.className = 'room-status ' + cls;
    }

    // ==================== RENDER PARTICIPANTS ====================
    function renderParticipants() {
      const list = document.getElementById('participant-list');
      const participants = currentRoom?.participants || {};
      const maxPlayers = currentRoom?.meta?.maxPlayers || 5;
      const entries = Object.entries(participants);

      let html = '';
      entries.forEach(([pid, p]) => {
        const color = getAvatarColor(p.name);
        const initial = p.name.charAt(0);
        const isMe = pid === playerId;
        const rollDisplay = typeof p.roll === 'number'
          ? `<span class="participant-roll roll-done">${p.roll}</span>`
          : `<span class="participant-roll roll-pending">未掷</span>`;

        html += `
          <div class="participant-item">
            <div class="participant-info">
              <div class="participant-avatar" style="background:${color}">${initial}</div>
              <span class="participant-name">${escapeHtml(p.name)}${isMe ? '<span class="you-tag">(我)</span>' : ''}</span>
            </div>
            ${rollDisplay}
          </div>`;
      });

      const remaining = maxPlayers - entries.length;
      if (remaining > 0) {
        html += `<div class="waiting-slots">还有 ${remaining} 个位置等待加入...</div>`;
      }

      list.innerHTML = html;
    }

    function updateProgress() {
      const participants = currentRoom?.participants || {};
      const maxPlayers = currentRoom?.meta?.maxPlayers || 5;
      const entries = Object.values(participants);
      const joined = entries.length;
      const revealed = entries.filter(p => typeof p.roll === 'number').length;

      document.getElementById('progress-text').textContent = `${joined} / ${maxPlayers} 人已加入`;
      document.getElementById('progress-fill').style.width = `${(joined / maxPlayers) * 100}%`;

      document.getElementById('roll-progress-text').textContent = `${revealed} / ${joined} 人已掷`;
      document.getElementById('roll-progress-fill').style.width = joined > 0 ? `${(revealed / joined) * 100}%` : '0%';

      // Update roll button state
      const btn = document.getElementById('btn-roll');
      const msg = document.getElementById('roll-message');
      const meInRoom = participants[playerId];
      const hasPreRolls = !!currentRoom?.preRolls;

      if (!meInRoom) {
        btn.disabled = true;
        msg.textContent = '你还未加入房间';
      } else if (myRoll !== null) {
        btn.disabled = true;
        msg.textContent = `你掷出了 ${myRoll} 点`;
      } else if (!hasPreRolls) {
        btn.disabled = true;
        msg.textContent = '等待所有人加入...';
      } else if (isRolling) {
        btn.disabled = true;
      } else {
        btn.disabled = false;
        msg.textContent = '点击掷骰子！';
      }
    }

    // ==================== DICE ROLLING ====================
    function rollDice() {
      if (isRolling || myRoll !== null) return;
      if (!currentRoom?.preRolls?.[playerId]) return;
      isRolling = true;

      const btn = document.getElementById('btn-roll');
      btn.disabled = true;

      // Use pre-assigned number (guaranteed unique)
      const result = currentRoom.preRolls[playerId];
      myRoll = result;

      // Start animation - dice lands on pre-assigned number
      animateDice(result, () => {
        // Write to Firebase to mark as revealed
        const playerRef = db.ref(`rooms/${currentRoomId}/participants/${playerId}`);
        playerRef.update({
          roll: result,
          rolledAt: Date.now()
        }).then(() => {
          isRolling = false;
          document.getElementById('roll-message').textContent = `你掷出了 ${result} 点！`;
        }).catch(() => {
          isRolling = false;
          showToast('网络错误，请重试');
          myRoll = null;
          btn.disabled = false;
        });
      });
    }

    // Rotation map: which rotation shows which face on front
    const DICE_ROTATIONS = {
      1: 'rotateX(0deg) rotateY(0deg)',
      2: 'rotateX(0deg) rotateY(180deg)',
      3: 'rotateX(0deg) rotateY(-90deg)',
      4: 'rotateX(0deg) rotateY(90deg)',
      5: 'rotateX(-90deg) rotateY(0deg)',
      6: 'rotateX(90deg) rotateY(0deg)'
    };

    function animateDice(result, callback) {
      const cube = document.getElementById('dice-cube');

      // Reset
      cube.classList.remove('rolling');
      cube.style.transition = 'none';
      cube.style.transform = 'rotateX(0deg) rotateY(0deg)';
      cube.offsetHeight; // force reflow

      // Spin animation
      cube.classList.add('rolling');

      // After spin animation, land on the result face
      setTimeout(() => {
        cube.classList.remove('rolling');
        cube.style.transition = 'transform 0.5s cubic-bezier(0.3, 0.9, 0.4, 1)';
        cube.style.transform = DICE_ROTATIONS[result];
      }, 1300);

      setTimeout(callback, 1800);
    }

    // ==================== CHECK ALL JOINED → PRE-ASSIGN ====================
    function checkAllJoined() {
      if (!currentRoom?.participants || !currentRoom?.meta) return;
      if (currentRoom.preRolls) return; // already pre-assigned

      const participants = Object.keys(currentRoom.participants);
      const maxPlayers = currentRoom.meta.maxPlayers || 5;

      if (participants.length >= maxPlayers) {
        // All joined! Generate unique numbers via Fisher-Yates shuffle
        const numbers = Array.from({length: participants.length}, (_, i) => i + 1);
        for (let i = numbers.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
        }
        const preRolls = {};
        participants.forEach((pid, idx) => { preRolls[pid] = numbers[idx]; });

        // Write once
        db.ref(`rooms/${currentRoomId}/preRolls`).transaction((current) => {
          if (current === null) return preRolls;
          return;
        });

        db.ref(`rooms/${currentRoomId}/meta/status`).set('rolling');
      }
    }

    // ==================== CHECK ALL REVEALED ====================
    function checkAllRevealed() {
      if (!currentRoom?.participants || !currentRoom?.meta || !currentRoom?.preRolls) return;
      const participants = Object.entries(currentRoom.participants);
      const allRevealed = participants.length > 0 && participants.every(([, p]) => typeof p.roll === 'number');

      if (allRevealed && !currentRoom.assignments) {
        computeAndWriteAssignments();
      }

      if (allRevealed && currentRoom.meta.status !== 'done') {
        db.ref(`rooms/${currentRoomId}/meta/status`).set('done');
      }
    }

    function computeAndWriteAssignments() {
      const participants = Object.entries(currentRoom.participants).map(([id, p]) => ({
        id, name: p.name, roll: p.roll
      }));

      // Sort by roll descending (all unique, no ties possible)
      participants.sort((a, b) => b.roll - a.roll);

      const topics = currentRoom.topics;
      const topicIds = Object.keys(topics).map(Number).sort((a, b) => a - b);
      const T = topicIds.length;
      const P = participants.length;

      const assignments = {};
      participants.forEach(p => { assignments[p.id] = []; });

      if (T <= P) {
        for (let i = 0; i < T; i++) {
          assignments[participants[i].id].push(topicIds[i]);
        }
      } else {
        const base = Math.floor(T / P);
        const extra = T % P;
        let topicIdx = 0;
        for (let i = 0; i < P; i++) {
          const count = base + (i < extra ? 1 : 0);
          for (let j = 0; j < count; j++) {
            assignments[participants[i].id].push(topicIds[topicIdx++]);
          }
        }
      }

      // Write to Firebase (only once)
      db.ref(`rooms/${currentRoomId}/assignments`).transaction((current) => {
        if (current === null) return assignments;
        return; // already written
      });
    }

    // ==================== RENDER RESULTS ====================
    function renderResults() {
      if (!currentRoom?.assignments || !currentRoom?.participants || !currentRoom?.topics) return;

      document.getElementById('dice-card').classList.add('hidden');
      document.getElementById('share-card').classList.add('hidden');
      document.getElementById('results-section').classList.remove('hidden');

      const participants = Object.entries(currentRoom.participants).map(([id, p]) => ({
        id, name: p.name, roll: p.roll, rolledAt: p.rolledAt || 0
      }));

      // Sort same way as assignment
      participants.sort((a, b) => {
        if (b.roll !== a.roll) return b.roll - a.roll;
        return a.rolledAt - b.rolledAt;
      });

      const list = document.getElementById('results-list');
      let html = '';

      participants.forEach((p, idx) => {
        const rankCls = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
        const topicIndices = currentRoom.assignments[p.id] || [];
        const topicHtml = topicIndices.length > 0
          ? topicIndices.map(ti => `<span class="topic-tag">${escapeHtml(currentRoom.topics[ti])}</span>`).join('<br>')
          : '<span class="no-topic">本轮无题</span>';

        html += `
          <div class="result-item">
            <div class="result-left">
              <div class="result-rank ${rankCls}">${idx + 1}</div>
              <div class="result-info">
                <h4>${escapeHtml(p.name)}${p.id === playerId ? ' (我)' : ''}</h4>
                <p>掷出 ${p.roll} 点</p>
              </div>
            </div>
            <div class="result-topic">${topicHtml}</div>
          </div>`;
      });

      list.innerHTML = html;
      document.getElementById('celebration-text').textContent = '分题完成！截图分享到群里吧';

      // Confetti
      launchConfetti();
    }

    // ==================== CONFETTI ====================
    function launchConfetti() {
      const colors = ['#4F46E5', '#F59E0B', '#10B981', '#EF4444', '#EC4899', '#8B5CF6'];
      for (let i = 0; i < 40; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 2 + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        const size = 6 + Math.random() * 8;
        piece.style.width = size + 'px';
        piece.style.height = size + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }

    // ==================== SHARE ====================
    let shareVisible = true;
    function toggleShare() {
      shareVisible = !shareVisible;
      const card = document.getElementById('share-card');
      const qr = card.querySelector('.qr-wrapper');
      const link = card.querySelector('.link-display');
      qr.classList.toggle('hidden', !shareVisible);
      link.classList.toggle('hidden', !shareVisible);
    }

    function copyLink() {
      const url = window.location.origin + window.location.pathname + '?room=' + currentRoomId;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
      } else {
        // Fallback
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('链接已复制');
      }
    }

    // ==================== CLEANUP ====================
    function cleanupOldRooms() {
      const cutoff = Date.now() - (24 * 60 * 60 * 1000);
      db.ref('rooms').orderByChild('meta/createdAt').endAt(cutoff).limitToFirst(10)
        .once('value', (snapshot) => {
          snapshot.forEach((child) => { child.ref.remove(); });
        });
    }

    // ==================== HELPERS ====================
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // ==================== INIT ON LOAD ====================
    window.addEventListener('DOMContentLoaded', () => {
      // Pre-fill nickname
      const savedName = localStorage.getItem('dice_nickname');
      if (savedName) document.getElementById('input-nickname').value = savedName;

      // Check URL for room
      const params = new URLSearchParams(window.location.search);
      const roomId = params.get('room');
      if (roomId) {
        enterRoom(roomId.toUpperCase());
      }
    });
  </script>
</body>
</html>
